[pytest]
# A-Z+T test suite. Run from the azt/ directory:
#   source env/bin/activate && pytest
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra
markers =
    integration: needs real app objects / data files (not a pure unit)
    needs_display: requires a live Tk display (skipped in headless CI)
